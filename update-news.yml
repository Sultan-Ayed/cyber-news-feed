name: Update Cybersecurity News

on:
  schedule:
    - cron: '0 * * * *'   # كل ساعة، بتوقيت UTC
  workflow_dispatch:        # يسمح بتشغيل يدوي من تبويب Actions

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch and translate latest news
        run: python scripts/fetch_news.py

      - name: Commit and push if changed
        run: |
          git config user.name "news-bot"
          git config user.email "news-bot@users.noreply.github.com"
          git add data/posts.json
          git diff --staged --quiet || git commit -m "Update cybersecurity news: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
